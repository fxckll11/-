<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
width:360px;
text-align:center;
}

.progress{
opacity:0.7;
margin-bottom:10px;
}

h2{
margin:20px 0;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
text-align:center;
font-size:16px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
}

.opt{
display:block;
margin:8px 0;
padding:10px;
background:#334155;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<div class="progress">{{ num }}/10</div>

<form method="post" action="/check">

<h2>{{ task.question }}</h2>

{% if task.options %}
{% for o in task.options %}
<label class="opt">
<input type="radio" name="answer" value="{{ o }}"> {{ o }}
</label>
{% endfor %}
{% else %}
<input name="answer" autocomplete="off" placeholder="Type answer">
{% endif %}

<button>Continue</button>

</form>

</div>

</body>
</html>
