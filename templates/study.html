<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vocabulary</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:radial-gradient(circle at top,#1e293b,#0f172a);
color:white;
}

.back{
position:fixed;
top:20px;
right:20px;
padding:12px 18px;
background:#3b82f6;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:600;
z-index:1000;
}

.container{
max-width:1100px;
margin:auto;
padding:90px 20px;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:30px;
}

.level{
margin-bottom:40px;
}

.level h2{
color:#22c55e;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
}

.word{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:14px;
text-align:center;
transition:0.2s;
position:relative;
}

.word:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.1);
}

.en{
font-weight:700;
font-size:16px;
}

.ru{
opacity:0.7;
margin-top:5px;
font-size:14px;
}

.speaker{
position:absolute;
top:8px;
right:8px;
background:#22c55e;
border:none;
border-radius:10px;
padding:5px 8px;
cursor:pointer;
font-size:12px;
color:white;
}
</style>
</head>

<body>

<a href="/" class="back">⬅ Back</a>

<div class="container">

<h1>📘 Vocabulary</h1>

{% for level, words in words.items() %}
<div class="level">

<h2>{{ level }}</h2>

<div class="grid">

{% for en, data in words.items() %}
<div class="word">

<button class="speaker" onclick="speak('{{ en }}')">▶</button>

<div class="en">{{ en }}</div>
<div class="ru">{{ data.translations[0] }}</div>

</div>
{% endfor %}

</div>
</div>
{% endfor %}

</div>

<script>
function speak(text){
    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
