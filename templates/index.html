<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mindjump</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#4f46e5,#22c55e);
color:white;
overflow:hidden;
}

/* ===== TOP BAR ===== */
.top{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
z-index:100;
}

/* progress */
.progress-box{
display:flex;
align-items:center;
gap:10px;
}

.bar{
width:180px;
height:10px;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.5s;
}

/* ===== BRAND (CENTER TOP) ===== */
.brand{
position:fixed;
top:60px;
left:50%;
transform:translateX(-50%);
text-align:center;
z-index:50;
}

.brand h1{
font-size:72px;   /* 🔥 увеличено */
font-weight:900;
margin:0;
letter-spacing:2px;
background: linear-gradient(90deg,#ffffff,#d1fae5);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-shadow:0 12px 35px rgba(0,0,0,0.35);
}

.brand p{
margin-top:10px;
font-size:22px;   /* 🔥 увеличено */
opacity:0.9;
font-weight:500;
text-shadow:0 6px 20px rgba(0,0,0,0.25);
}

/* ===== MAIN CENTER ===== */
.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding-top:80px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
width:350px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.btn{
display:block;
margin:10px;
padding:14px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:700;
transition:0.2s;
}

.btn:hover{
transform:scale(1.05);
}

.a1{background:#22c55e;}
.a2{background:#3b82f6;}
.b1{background:#8b5cf6;}
.b2{background:#f59e0b;}
.c1{background:#ef4444;}
.c2{background:#ec4899;}

/* ===== RIGHT SIDEBAR ===== */
.side{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
}

.side a{
background:rgba(255,255,255,0.2);
padding:12px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:600;
text-align:center;
transition:0.2s;
}

.side a:hover{
background:white;
color:black;
transform:scale(1.05);
}

/* ===== DAILY QUESTS ===== */
.daily{
position:fixed;
left:20px;
top:50%;
transform:translateY(-50%);
width:220px;
}

.daily h3{
margin-bottom:10px;
}

.quest{
background:rgba(255,255,255,0.15);
padding:10px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
transition:0.3s;
}

.quest.done{
background:#22c55e;
transform:scale(1.03);
}

</style>
</head>

<body>

<!-- ===== TOP ===== -->
<div class="top">
<div class="progress-box">
<div class="bar">
<div class="fill" style="width: {{ percent }}%;"></div>
</div>
<div>{{ level }}</div>
</div>
</div>

<!-- ===== BRAND ===== -->
<div class="brand">
<h1>MindJump</h1>
<p>Learn faster. Jump higher.</p>
</div>

<!-- ===== DAILY QUESTS ===== -->
<div class="daily">

<h3>🎯 Daily</h3>

<div class="quest {% if daily.q1 %}done{% endif %}">
Grammar test → XP x1.5
</div>

<div class="quest {% if daily.q2 %}done{% endif %}">
Translation test → XP x2
</div>

<div class="quest {% if daily.q3 %}done{% endif %}">
Study 10 min → +50 XP
</div>

</div>

<!-- ===== MAIN ===== -->
<div class="container">
<div class="card">

<h2>🚀 Learn English</h2>

<a class="btn a1" href="/start/A1">A1</a>
<a class="btn a2" href="/start/A2">A2</a>
<a class="btn b1" href="/start/B1">B1</a>
<a class="btn b2" href="/start/B2">B2</a>
<a class="btn c1" href="/start/C1">C1</a>
<a class="btn c2" href="/start/C2">C2</a>

</div>
</div>

<!-- ===== RIGHT SIDE ===== -->
<div class="side">
<a href="/study">📘 Words</a>
<a href="/rules">📖 Grammar</a>
</div>

</body>
</html>
