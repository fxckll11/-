<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Learn English</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0f172a;
color:white;
}

/* ===== TOP PROGRESS ===== */
.top{
position:fixed;
top:15px;
left:15px;
display:flex;
align-items:center;
gap:10px;
background:#1e293b;
padding:10px 14px;
border-radius:14px;
z-index:1000;
}

.bar{
width:140px;
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#22c55e;
transition:0.3s;
}

.level{
font-weight:700;
}

/* ===== MAIN MENU ===== */
.card{
background:#1e293b;
padding:30px;
border-radius:20px;
width:360px;
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.btn{
display:block;
margin:10px;
padding:14px;
background:#3b82f6;
border-radius:14px;
color:white;
text-decoration:none;
font-weight:600;
transition:0.2s;
}

.btn:hover{
background:#2563eb;
transform:scale(1.03);
}

/* ===== LEFT DAILY QUESTS ===== */
.quests{
position:fixed;
left:20px;
top:50%;
transform:translateY(-50%);
background:#1e293b;
padding:15px;
border-radius:15px;
width:240px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.q{
margin:8px 0;
padding:10px;
background:#334155;
border-radius:10px;
font-size:14px;
}

.done{
background:#22c55e;
}

/* ===== RIGHT MENU (ВОССТАНОВЛЕНО) ===== */
.side{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
}

.side a{
display:block;
margin:8px;
padding:12px;
background:#22c55e;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:600;
text-align:center;
transition:0.2s;
}

.side a:hover{
transform:scale(1.05);
background:#16a34a;
}
</style>
</head>

<body>

<!-- TOP PROGRESS -->
<div class="top">
<div class="bar">
<div class="fill"
style="width: {{ (progress.translation_done + progress.grammar_done) * 2 }}%"></div>
</div>
<div class="level">{{ level }}</div>
</div>

<!-- LEFT QUESTS -->
<div class="quests">

<h3>Daily Quests</h3>

<div class="q {{ 'done' if daily.q1 else '' }}">
🧠 Grammar challenge (+1.5x XP)
</div>

<div class="q {{ 'done' if daily.q2 else '' }}">
📘 Translation run (+2x XP)
</div>

<div class="q {{ 'done' if daily.q3 else '' }}">
⏱ Study 10 minutes (+50 XP)
</div>

</div>

<!-- MAIN MENU -->
<div class="card">
<h2>Learn English</h2>

<a class="btn" href="/start/A1">A1</a>
<a class="btn" href="/start/A2">A2</a>
<a class="btn" href="/start/B1">B1</a>
<a class="btn" href="/start/B2">B2</a>
<a class="btn" href="/start/C1">C1</a>
<a class="btn" href="/start/C2">C2</a>
</div>

<!-- RIGHT MENU (ВОЗВРАЩЕНО) -->
<div class="side">
<a href="/study">📘 Words</a>
<a href="/rules">📖 Grammar</a>
</div>

</body>
</html>
