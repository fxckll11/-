<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Result</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0f172a;
color:white;
}

.top{
position:fixed;
top:15px;
left:15px;
display:flex;
align-items:center;
gap:10px;
background:#1e293b;
padding:10px 14px;
border-radius:14px;
}

.bar{
width:140px;
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#22c55e;
}

.container{
max-width:700px;
margin:auto;
padding:80px 20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:14px;
margin-bottom:10px;
}

.ok{border-left:5px solid #22c55e;}
.bad{border-left:5px solid #ef4444;}

.title{
text-align:center;
font-size:28px;
margin-bottom:10px;
}

.score{
text-align:center;
font-size:45px;
color:#22c55e;
font-weight:800;
}

.btn{
display:block;
text-align:center;
margin-top:20px;
padding:14px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:12px;
}
</style>
</head>

<body>

<div class="top">
<div class="bar">
<div class="fill"
style="width: {{ (progress.translation_done + progress.grammar_done) * 2 }}%"></div>
</div>
<div>{{ level }}</div>
</div>

<div class="container">

<div class="title">Result</div>
<div class="score">{{ score }}/10</div>

{% for r in results %}
<div class="card {{ 'ok' if r.ok else 'bad' }}">
<div><b>{{ r.question }}</b></div>
<div>Your: {{ r.user }}</div>
<div>Correct: {{ r.correct }}</div>
</div>
{% endfor %}

<a class="btn" href="/">Main Menu</a>

</div>

</body>
</html>
