<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#22c55e,#4f46e5);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* card */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
width:420px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* score */
.score{
font-size:60px;
font-weight:800;
margin:20px 0;
}

/* xp */
.xp{
background:#22c55e;
padding:10px;
border-radius:10px;
margin-bottom:20px;
}

/* answers */
.answers{
text-align:left;
max-height:250px;
overflow:auto;
margin-top:15px;
}

.item{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.ok{border-left:5px solid #22c55e;}
.bad{border-left:5px solid #ef4444;}

button{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>🎉 Result</h2>

<div class="score">{{ score }}/10</div>

<div class="xp">+{{ xp }} XP</div>

<div class="answers">
{% for r in results %}
<div class="item {% if r.ok %}ok{% else %}bad{% endif %}">
<b>{{ r.question }}</b><br>
You: {{ r.user }}<br>
Correct: {{ r.correct }}
</div>
{% endfor %}
</div>

<form action="/">
<button>Main Menu</button>
</form>

</div>

</body>
</html>
