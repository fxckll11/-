<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#6366f1,#22c55e);
color:white;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

/* ===== TOP BAR ===== */
.top{
width:100%;
padding:20px;
display:flex;
justify-content:center;
position:relative;
}

.progress{
width:60%;
height:10px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#22c55e;
width:{{ (num/10)*100 }}%;
}

/* back */
.back{
position:absolute;
left:20px;
top:15px;
background:white;
color:black;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

/* ===== CARD ===== */
.card{
margin-top:40px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
width:400px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* question */
.question{
font-size:22px;
font-weight:700;
margin-bottom:20px;
}

/* speak button */
.speak{
margin-bottom:15px;
padding:8px 12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* options */
.opt{
display:block;
margin:10px 0;
padding:14px;
background:rgba(255,255,255,0.2);
border-radius:12px;
cursor:pointer;
transition:0.2s;
text-align:left;
}

.opt:hover{
background:white;
color:black;
transform:scale(1.03);
}

/* input */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
text-align:center;
font-size:16px;
outline:none;
}

/* button */
button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#16a34a;
}

</style>
</head>

<body>

<!-- ===== TOP ===== -->
<div class="top">

<a href="/" class="back">⬅</a>

<div class="progress">
<div class="fill"></div>
</div>

</div>

<!-- ===== TASK ===== -->
<div class="card">

<form method="post">

<div class="question">{{ task.question }}</div>

<!-- 🔊 озвучка -->
<button type="button" class="speak" onclick="speak('{{ task.question }}')">🔊 Listen</button>

{% if task.type == "choice" %}
    {% for o in task.options %}
    <label class="opt">
        <input type="radio" name="answer" value="{{ o }}"> {{ o }}
    </label>
    {% endfor %}
{% else %}
    <input name="answer" placeholder="Type your answer..." autocomplete="off">
{% endif %}

<button>Continue</button>

</form>

</div>

<!-- JS -->
<script>
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}
</script>

</body>
</html>
